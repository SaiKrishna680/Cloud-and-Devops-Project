---
# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Service — NodePort
#
# Exposes Prometheus UI at http://localhost:30090 on Docker Desktop
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: devsecops
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name:       http
      port:       9090
      targetPort: 9090
      nodePort:   30090    # Access at http://localhost:30090
