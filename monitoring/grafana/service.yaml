---
# ─────────────────────────────────────────────────────────────────────────────
# Grafana Service — NodePort
#
# Access Grafana dashboards at http://localhost:30030
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: devsecops
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name:       http
      port:       3000
      targetPort: 3000
      nodePort:   30030    # Access at http://localhost:30030
