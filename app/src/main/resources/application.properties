# ── Server Configuration ──────────────────────────────────────────────────────
server.port=8080

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=devsecops-app

# ── Actuator ——— expose all endpoints (Prometheus scraping)  ──────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ── Kubernetes Liveness & Readiness Probes ─────────────────────────────────────
# Enables /actuator/health/liveness and /actuator/health/readiness
# Required by k8s/deployment.yaml livenessProbe and readinessProbe
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoint.health.probes.enabled=true

# Prometheus endpoint at /actuator/prometheus
management.prometheus.metrics.export.enabled=true
management.endpoint.prometheus.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.devsecops=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
