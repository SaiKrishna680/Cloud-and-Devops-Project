---
# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes Secret — Docker Registry Pull Secret
#
# WHY: When the Docker image is in a private registry (localhost:5000),
#      Kubernetes needs credentials to pull it.
#
# HOW TO GENERATE:
#   Run scripts/setup.ps1 which creates this secret automatically via:
#     kubectl create secret docker-registry registry-secret \
#       --docker-server=localhost:5000 \
#       --docker-username=admin \
#       --docker-password=admin123 \
#       -n devsecops
#
# ⚠️  DO NOT commit real credentials — use external secrets manager in prod.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: devsecops
type: kubernetes.io/dockerconfigjson
data:
  # Base64-encoded Docker config JSON
  # This is a PLACEHOLDER — generated by setup.ps1
  # To regenerate manually:
  #   $creds = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes('admin:admin123'))
  #   $json = '{"auths":{"localhost:5000":{"auth":"' + $creds + '"}}}'
  #   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($json))
  .dockerconfigjson: eyJhdXRocyI6eyJsb2NhbGhvc3Q6NTAwMCI6eyJhdXRoIjoiWVdSdGFXNDZZV1J0YVc0eE1qTT0ifX19
